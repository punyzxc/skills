<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ЗАГОЛОВОК ПРЕЗЕНТАЦИИ]</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
        }

        @media (max-width: 1920px) { html { font-size: 16px; } }
        @media (max-width: 1440px) { html { font-size: 15px; } }
        @media (max-width: 1024px) { html { font-size: 14px; } }
        @media (max-width: 768px) { html { font-size: 13px; } }
        @media (max-width: 480px) { html { font-size: 12px; } }

        :root {
            --bg-dark: #09090b;
            --surface: #18181b;
            --border: #27272a;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --accent-1: #6366f1;
            --accent-2: #3b82f6;
            --accent-3: #0ea5e9;
            --accent-4: #06b6d4;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --gradient: linear-gradient(135deg, #6366f1 0%, #0ea5e9 100%);
            --glow: rgba(99, 102, 241, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(180deg, var(--bg-dark) 0%, #0f0f0f 100%);
            color: var(--text-primary);
            overflow-x: hidden;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(3, 165, 233, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-0.5deg); }
        }

        html { scroll-snap-type: y mandatory; }

        section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            scroll-snap-align: start;
            padding: clamp(2rem, 8vw, 4rem);
            position: relative;
            overflow: hidden;
        }

        .slide-content {
            max-width: min(90%, 900px);
            width: 100%;
            z-index: 2;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            font-size: clamp(0.75rem, 1.5vw, 0.95rem);
            color: var(--accent-3);
            margin-bottom: clamp(1rem, 3vw, 1.5rem);
            backdrop-filter: blur(10px);
            font-weight: 500;
        }

        .badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }

        h1 {
            font-size: clamp(1.75rem, 6vw, 3.5rem);
            font-weight: 700;
            margin-bottom: clamp(0.75rem, 2vw, 1.25rem);
            line-height: 1.15;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        h2 {
            font-size: clamp(1.5rem, 4vw, 2.25rem);
            font-weight: 700;
            margin-bottom: clamp(1rem, 2vw, 1.5rem);
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }

        h3 {
            font-size: clamp(1.1rem, 2.5vw, 1.5rem);
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
            line-height: 1.3;
        }

        h4 {
            font-size: clamp(0.95rem, 1.8vw, 1.15rem);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        p {
            font-size: clamp(0.9rem, 1.8vw, 1.05rem);
            line-height: 1.7;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
        }

        .divider {
            height: 2px;
            border: none;
            background: var(--gradient);
            margin: clamp(1rem, 3vw, 1.5rem) 0;
            opacity: 0.5;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: clamp(0.75rem, 2vw, 1.25rem);
            padding: clamp(1.25rem, 3vw, 1.75rem);
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .glass-card:hover {
            transform: translateY(-4px);
            border-color: rgba(99, 102, 241, 0.3);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 60px var(--glow);
        }

        .glass-card.accent::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient);
            border-radius: 16px 16px 0 0;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .glass-card.accent:hover::before {
            opacity: 1;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: clamp(1rem, 2vw, 1.5rem);
            margin: clamp(1.5rem, 3vw, 2rem) 0;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: clamp(1rem, 2vw, 1.5rem);
            margin: clamp(1.5rem, 3vw, 2rem) 0;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: clamp(0.75rem, 1.5vw, 1.25rem);
            margin: clamp(1.5rem, 3vw, 2rem) 0;
        }

        .icon-circle {
            width: clamp(2.5rem, 6vw, 3.5rem);
            height: clamp(2.5rem, 6vw, 3.5rem);
            border-radius: 50%;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin-bottom: clamp(0.75rem, 2vw, 1.25rem);
            box-shadow: 0 8px 30px var(--glow);
            flex-shrink: 0;
        }

        .icon-circle svg {
            width: clamp(1.25rem, 3vw, 1.75rem);
            height: clamp(1.25rem, 3vw, 1.75rem);
        }

        .title-slide {
            text-align: center;
        }

        .title-slide h1 {
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: clamp(1.5rem, 3vw, 2rem);
        }

        .title-subtitle {
            font-size: clamp(1rem, 2.5vw, 1.35rem);
            color: var(--text-secondary);
            margin-bottom: clamp(2rem, 5vw, 2.5rem);
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        .authors-grid {
            display: flex;
            justify-content: center;
            gap: clamp(0.75rem, 1.5vw, 1.25rem);
            flex-wrap: wrap;
            margin-bottom: clamp(1.5rem, 3vw, 2rem);
        }

        .author-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(0.4rem, 1vw, 0.6rem);
            padding: clamp(0.75rem, 1.5vw, 1.25rem);
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: clamp(0.75rem, 1.5vw, 1rem);
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
        }

        .author-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent-1);
        }

        .author-avatar {
            width: clamp(2.5rem, 5vw, 3rem);
            height: clamp(2.5rem, 5vw, 3rem);
            border-radius: 50%;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: clamp(1rem, 2vw, 1.35rem);
            color: white;
        }

        .author-name {
            font-weight: 500;
            color: var(--text-primary);
            font-size: clamp(0.8rem, 1.8vw, 1rem);
            text-align: center;
        }

        .group-badge {
            display: inline-flex;
            align-items: center;
            gap: clamp(0.6rem, 1.5vw, 1rem);
            padding: clamp(0.6rem, 1.5vw, 1rem);
            background: var(--glass);
            border: 1px solid var(--accent-1);
            border-radius: 50px;
            font-size: clamp(0.8rem, 1.8vw, 1rem);
            color: var(--accent-1);
            backdrop-filter: blur(20px);
        }

        .styled-list {
            list-style: none;
            margin: clamp(0.75rem, 1.5vw, 1.25rem) 0;
        }

        .styled-list li {
            padding: clamp(0.6rem, 1.2vw, 0.95rem) clamp(0.75rem, 1.5vw, 1.25rem) clamp(0.6rem, 1.2vw, 0.95rem) clamp(1.5rem, 2.5vw, 2.5rem);
            position: relative;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: clamp(0.4rem, 0.8vw, 0.6rem);
            font-size: clamp(0.85rem, 1.6vw, 1rem);
        }

        .styled-list li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: var(--accent-3);
            font-weight: 600;
        }

        .stat-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: clamp(0.75rem, 1.5vw, 1.25rem);
            padding: clamp(1rem, 2vw, 1.5rem);
            text-align: center;
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-1);
        }

        .stat-number {
            font-size: clamp(1.75rem, 4vw, 2.5rem);
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: clamp(0.4rem, 1vw, 0.75rem);
        }

        .stat-label {
            font-size: clamp(0.8rem, 1.6vw, 1rem);
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .key-point {
            display: flex;
            gap: clamp(0.75rem, 1.5vw, 1.25rem);
            padding: clamp(1rem, 2vw, 1.5rem);
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: clamp(0.75rem, 1.5vw, 1.25rem);
            backdrop-filter: blur(20px);
            align-items: flex-start;
            transition: all 0.3s ease;
            margin-top: clamp(1rem, 2vw, 1.5rem);
        }

        .key-point:hover {
            transform: translateY(-2px);
            border-color: var(--accent-1);
        }

        .key-point-content {
            flex: 1;
        }

        .key-point-icon {
            flex-shrink: 0;
            width: clamp(2.2rem, 4vw, 3rem);
            height: clamp(2.2rem, 4vw, 3rem);
            border-radius: 50%;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: clamp(1rem, 2vw, 1.4rem);
        }

        .nav-dots {
            position: fixed;
            right: clamp(1rem, 3vw, 2rem);
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: clamp(0.6rem, 1.2vw, 1rem);
            z-index: 100;
        }

        .nav-dot {
            width: clamp(0.6rem, 1.2vw, 0.75rem);
            height: clamp(0.6rem, 1.2vw, 0.75rem);
            border-radius: 50%;
            background: var(--glass);
            border: 2px solid var(--glass-border);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-dot.active {
            background: var(--accent-1);
            border-color: var(--accent-1);
            box-shadow: 0 0 15px var(--accent-1);
        }

        .nav-dot:hover {
            border-color: var(--accent-1);
            transform: scale(1.2);
        }

        .slide-counter {
            position: fixed;
            bottom: clamp(1rem, 2vw, 2rem);
            right: clamp(1rem, 2vw, 2rem);
            padding: clamp(0.4rem, 0.8vw, 0.6rem) clamp(0.8rem, 1.5vw, 1.25rem);
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            font-size: clamp(0.7rem, 1.4vw, 0.9rem);
            color: var(--text-secondary);
            backdrop-filter: blur(10px);
            z-index: 100;
            font-weight: 500;
        }

        .progress-wrap {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--glass);
            z-index: 101;
        }

        .progress-bar {
            height: 100%;
            background: var(--gradient);
            width: 0%;
            transition: width 0.1s ease;
        }

        .author-footer {
            position: fixed;
            bottom: clamp(1rem, 2vw, 2rem);
            left: clamp(1rem, 2vw, 2rem);
            padding: clamp(0.4rem, 0.8vw, 0.6rem) clamp(0.8rem, 1.5vw, 1.25rem);
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            font-size: clamp(0.65rem, 1.3vw, 0.85rem);
            color: var(--text-muted);
            backdrop-filter: blur(10px);
            z-index: 100;
            max-width: min(90vw, 300px);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .animate-on-view {
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stagger > :nth-child(1) { animation-delay: 0.1s; }
        .stagger > :nth-child(2) { animation-delay: 0.2s; }
        .stagger > :nth-child(3) { animation-delay: 0.3s; }
        .stagger > :nth-child(4) { animation-delay: 0.4s; }
        .stagger > :nth-child(5) { animation-delay: 0.5s; }
        .stagger > :nth-child(6) { animation-delay: 0.6s; }

        @keyframes arrowPulse {
            0%, 100% { opacity: 1; transform: translateX(0); }
            50% { opacity: 0.5; transform: translateX(5px); }
        }

        .process-flow {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(0.5rem, 1vw, 1rem);
            flex-wrap: wrap;
            margin: clamp(1.5rem, 3vw, 2rem) 0;
        }

        .process-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(0.6rem, 1.2vw, 1rem);
        }

        .step-icon {
            width: clamp(2.5rem, 5vw, 3.5rem);
            height: clamp(2.5rem, 5vw, 3.5rem);
            border-radius: 50%;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.1rem, 2.2vw, 1.6rem);
            font-weight: 700;
            color: white;
            box-shadow: 0 8px 30px var(--glow);
        }

        .step-label {
            font-size: clamp(0.8rem, 1.6vw, 1rem);
            color: var(--text-secondary);
            text-align: center;
            max-width: 100px;
            line-height: 1.3;
        }

        .process-arrow {
            font-size: clamp(1.1rem, 2vw, 1.5rem);
            color: var(--accent-3);
            animation: arrowPulse 1.5s ease-in-out infinite;
        }

        .thank-you-slide {
            text-align: center;
        }

        .thank-you-slide h1 {
            font-size: clamp(2rem, 7vw, 4rem);
            margin-bottom: clamp(1.5rem, 3vw, 2.5rem);
        }

        .thank-you-slide p {
            font-size: clamp(1rem, 2.2vw, 1.4rem);
            color: var(--text-secondary);
            margin-bottom: clamp(2rem, 4vw, 2.5rem);
        }

        @media (max-width: 1024px) {
            .grid-4 { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
            .author-footer { display: none; }
        }

        @media (max-width: 768px) {
            .nav-dots { right: 1rem; }
            .process-flow { gap: 0.5rem; }
        }

        @media (max-width: 600px) {
            .nav-dots { display: none; }
            .key-point { flex-direction: column; align-items: center; text-align: center; }
            .process-flow { flex-direction: column; gap: 0.5rem; }
            .process-arrow { display: none; }
        }
    </style>
</head>
<body>
    <div class="progress-wrap">
        <div class="progress-bar"></div>
    </div>

    <div class="nav-dots" id="navDots"></div>

    <div class="slide-counter">
        <span id="currentSlide">1</span> / <span id="totalSlides">2</span>
    </div>

    <div class="author-footer">
        © Ваше имя • Организация
    </div>

    <!-- Slide 1: Title -->
    <section id="slide-1">
        <div class="slide-content title-slide">
            <div class="badge animate-on-view">
                <span class="badge-dot"></span>
                Тема
            </div>
            <h1 class="animate-on-view">Заголовок презентации</h1>
            <p class="title-subtitle animate-on-view">Подзаголовок или краткое описание</p>
            
            <hr class="divider animate-on-view">

            <div class="authors-grid stagger">
                <div class="author-card animate-on-view">
                    <div class="author-avatar">А</div>
                    <div class="author-name">Автор 1</div>
                </div>
            </div>

            <div class="group-badge animate-on-view">
                <span>Группа</span>
                <span>•</span>
                <span>Организация</span>
            </div>
        </div>
    </section>

    <!-- Slide 2: Thank You -->
    <section id="slide-2">
        <div class="slide-content thank-you-slide">
            <h1 class="animate-on-view" style="color: transparent; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
                Спасибо за внимание!
            </h1>
            <p class="animate-on-view" style="margin-bottom: clamp(2rem, 4vw, 2.5rem);">Вопросы и обсуждение</p>

            <div class="authors-grid stagger">
                <div class="author-card animate-on-view">
                    <div class="author-avatar">А</div>
                    <div class="author-name">Автор 1</div>
                </div>
            </div>

            <div class="group-badge animate-on-view" style="margin-top: clamp(2rem, 4vw, 2.5rem);">
                <span>Группа</span>
                <span>•</span>
                <span>Организация</span>
            </div>
        </div>
    </section>

    <script>
        const sections = document.querySelectorAll('section');
        const totalSlides = sections.length;
        const navDotsContainer = document.getElementById('navDots');
        const currentSlideSpan = document.getElementById('currentSlide');
        const totalSlidesSpan = document.getElementById('totalSlides');
        const progressBar = document.querySelector('.progress-bar');

        // Create navigation dots
        for (let i = 0; i < totalSlides; i++) {
            const dot = document.createElement('div');
            dot.className = 'nav-dot';
            if (i === 0) dot.classList.add('active');
            dot.addEventListener('click', () => {
                sections[i].scrollIntoView({ behavior: 'smooth' });
            });
            navDotsContainer.appendChild(dot);
        }

        const navDots = document.querySelectorAll('.nav-dot');
        totalSlidesSpan.textContent = totalSlides;

        let currentSlideIndex = 0;

        // Update on scroll
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    const index = Array.from(sections).indexOf(entry.target);
                    currentSlideIndex = index;
                    currentSlideSpan.textContent = index + 1;
                    
                    navDots.forEach((dot, i) => {
                        dot.classList.toggle('active', i === index);
                    });

                    const progress = ((index + 1) / totalSlides) * 100;
                    progressBar.style.width = progress + '%';
                }
            });
        }, { threshold: 0.5 });

        sections.forEach((section) => observer.observe(section));

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            let nextSlideIndex = -1;
            
            if (e.key === 'ArrowDown' || e.key === ' ' || e.key === 'ArrowRight') {
                e.preventDefault();
                nextSlideIndex = Math.min(currentSlideIndex + 1, totalSlides - 1);
            } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
                e.preventDefault();
                nextSlideIndex = Math.max(currentSlideIndex - 1, 0);
            }

            if (nextSlideIndex !== -1 && nextSlideIndex !== currentSlideIndex) {
                sections[nextSlideIndex].scrollIntoView({ behavior: 'smooth' });
            }
        });

        // Mouse wheel navigation
        let lastWheelTime = 0;
        document.addEventListener('wheel', (e) => {
            const now = Date.now();
            if (now - lastWheelTime < 500) return;
            
            let nextSlideIndex = -1;
            
            if (e.deltaY > 0 && currentSlideIndex < totalSlides - 1) {
                nextSlideIndex = currentSlideIndex + 1;
                e.preventDefault();
            } else if (e.deltaY < 0 && currentSlideIndex > 0) {
                nextSlideIndex = currentSlideIndex - 1;
                e.preventDefault();
            }

            if (nextSlideIndex !== -1) {
                lastWheelTime = now;
                sections[nextSlideIndex].scrollIntoView({ behavior: 'smooth' });
            }
        }, { passive: false });

        // Touch navigation for mobile
        let touchStartY = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', (e) => {
            const touchEndY = e.changedTouches[0].clientY;
            const diff = touchStartY - touchEndY;
            
            if (Math.abs(diff) > 50) {
                let nextSlideIndex = -1;
                
                if (diff > 0 && currentSlideIndex < totalSlides - 1) {
                    nextSlideIndex = currentSlideIndex + 1;
                } else if (diff < 0 && currentSlideIndex > 0) {
                    nextSlideIndex = currentSlideIndex - 1;
                }

                if (nextSlideIndex !== -1) {
                    sections[nextSlideIndex].scrollIntoView({ behavior: 'smooth' });
                }
            }
        });

        // Update animations on view
        const animateOnView = (el) => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach((entry) => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('animate-in');
                    }
                });
            }, { threshold: 0.1 });
            observer.observe(el);
        };

        document.querySelectorAll('.animate-on-view').forEach(animateOnView);
    </script>
</body>
</html>
